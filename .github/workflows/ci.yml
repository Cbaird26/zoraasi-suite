name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install ruff
      - name: Ruff check
        run: ruff check api/ --ignore E501

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd api && pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Unit and integration tests
        run: cd api && JWT_SECRET=test-secret python -m pytest tests/ -v
